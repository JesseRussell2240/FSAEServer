<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #9da7b3;
            --accent: #c9972f;
            --danger: #da3633;
            --ok: #2ea043;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, sans-serif;
        }
        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h1, h2, h3 { margin-top: 0; }
        p { color: var(--muted); }
        label { display: block; margin: 8px 0 4px; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0b0f14;
            color: var(--text);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }
        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .row.spread { justify-content: space-between; }
        .checks label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 12px;
        }
        button {
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #1f2937;
            color: var(--text);
            cursor: pointer;
        }
        button.primary { background: var(--accent); color: #111; border-color: var(--accent); }
        button.danger { background: var(--danger); border-color: var(--danger); }
        .flash {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .flash.success { background: rgba(46, 160, 67, 0.15); border-color: var(--ok); }
        .flash.error { background: rgba(218, 54, 51, 0.15); border-color: var(--danger); }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 10px 8px;
            border-top: 1px solid var(--border);
            vertical-align: top;
        }
        code {
            background: #0b0f14;
            padding: 2px 6px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
