<VirtualHost *:80>
    ServerName conestogaformulaelectric.ca
    ServerAlias www.conestogaformulaelectric.ca
    ServerAdmin webmaster@conestogaformulaelectric.ca

    DocumentRoot /var/www/conestogaformulaelectric.ca/current

    <Directory /var/www/conestogaformulaelectric.ca/current>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
        DirectoryIndex index.html
    </Directory>

    # Internet-reachable CAD vault. Keep authentication enabled.
    <Location /svn>
        DAV svn
        SVNParentPath /srv/svn
        SVNListParentPath on
        DavLockDB /var/lib/apache2/davlock/DavLock
        AuthType Basic
        AuthName "Conestoga Formula Electric CAD Vault"
        AuthUserFile /etc/apache2/dav_svn.passwd
        AuthzSVNAccessFile /etc/apache2/dav_svn.authz
        Require valid-user
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/conestogaformulaelectric.ca-error.log
    CustomLog ${APACHE_LOG_DIR}/conestogaformulaelectric.ca-access.log combined
</VirtualHost>
